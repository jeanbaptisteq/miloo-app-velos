<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miloo - Fiches vendeur vélos</title>

  <style>
    :root {
      color-scheme: light;
      --ink: #17201b;
      --muted: #5c6760;
      --line: #d9ded8;
      --panel: #ffffff;
      --page: #f5f6f2;
      --brand: #1d6f5f;
      --brand-dark: #124f45;
      --accent: #c7482d;
      --gold: #b28a35;
      --blue: #245d8f;
      --shadow: 0 14px 34px rgba(23, 32, 27, .11);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      min-width: 320px;
    }

    button, a {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 246, 242, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 12px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .brandline {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 850;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 1.8vw, 1.75rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search {
      min-width: min(32vw, 360px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px 12px;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(29, 111, 95, .14);
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px;
      width: 100%;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .rail {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .visual {
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #dfe5dc;
      min-height: 102px;
    }

    .visual img {
      display: block;
      width: 100%;
      height: 116px;
      object-fit: cover;
    }

    .family-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .family-button {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      min-height: 76px;
      text-align: left;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      color: var(--ink);
    }

    .family-button:hover,
    .family-button.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(29, 111, 95, .12);
    }

    .family-button.active {
      background: #eef6f1;
    }

    .family-name {
      display: block;
      font-size: 1rem;
      font-weight: 780;
      line-height: 1.1;
    }

    .family-use {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.2;
    }

    .speed-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: end;
      gap: 5px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 5px 8px;
      background: #e8ece7;
      color: #2e3732;
      font-size: .78rem;
      font-weight: 760;
      white-space: nowrap;
    }

    .detail {
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: stretch;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--brand-dark);
      font-size: .83rem;
      font-weight: 820;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 3.6rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 12px 0 0;
      max-width: 70ch;
      color: #324039;
      font-size: clamp(1rem, 1.4vw, 1.18rem);
      line-height: 1.45;
    }

    .pricebox {
      min-width: 220px;
      border-left: 1px solid var(--line);
      padding-left: 18px;
      display: grid;
      gap: 10px;
      align-content: center;
    }

    .price {
      font-size: clamp(1.5rem, 2.5vw, 2.35rem);
      line-height: 1;
      font-weight: 880;
      color: var(--accent);
      white-space: nowrap;
    }

    .tax {
      color: var(--muted);
      font-size: .85rem;
    }

    .variant-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .variant-tab {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 14px;
      font-size: 1rem;
      font-weight: 780;
      cursor: pointer;
    }

    .variant-tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      gap: 14px;
      align-items: start;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .pitch-list,
    .option-list,
    .pdf-list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .pitch-list li,
    .option-list li {
      position: relative;
      padding-left: 18px;
      line-height: 1.38;
      color: #2c3832;
    }

    .pitch-list li::before,
    .option-list li::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      position: absolute;
      left: 0;
      top: .55em;
    }

    .specs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .spec {
      min-height: 82px;
      border: 1px solid #e1e5df;
      border-radius: 8px;
      padding: 11px;
      background: #fbfcfa;
    }

    .spec-label {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .spec-value {
      display: block;
      margin-top: 6px;
      font-size: 1rem;
      line-height: 1.24;
      font-weight: 740;
      overflow-wrap: anywhere;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .94rem;
    }

    .compare-table th,
    .compare-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      line-height: 1.32;
    }

    .compare-table th {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .pdf-list a {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--brand-dark);
      background: #fbfcfa;
      text-decoration: none;
      font-weight: 760;
    }

    .pdf-list a:hover {
      border-color: var(--brand);
      background: #eef6f1;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      border-radius: 999px;
      background: #ecf0ed;
      color: #34413a;
      padding: 6px 10px;
      font-size: .83rem;
      font-weight: 720;
    }

    .source-note {
      margin: 0;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.35;
    }

    @media (max-width: 1080px) {
      main {
        grid-template-columns: 1fr;
      }

      .rail {
        position: static;
      }

      .family-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .visual {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .actions,
      .search {
        width: 100%;
        min-width: 0;
      }

      main {
        padding: 12px;
      }

      .family-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .pricebox {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding-left: 0;
        padding-top: 14px;
      }
    }

    @media (max-width: 540px) {
      .family-grid,
      .specs {
        grid-template-columns: 1fr;
      }

      .family-button {
        min-height: 68px;
      }

      .compare-table {
        font-size: .86rem;
      }

      .compare-table th,
      .compare-table td {
        padding: 9px 5px;
      }
    }

    @media print {
      header, .rail, .variant-tabs { display: none; }
      main, .content-grid, .hero { display: block; padding: 0; }
      .section, .hero { box-shadow: none; break-inside: avoid; margin-bottom: 12px; }
      body { background: #fff; }
    }
  </style>
</head>

    const state = {
      bikeId: bikes[0].id,
      speed: Object.keys(bikes[0].variants)[0],
      query: ""
    };

    const familyGrid = document.querySelector("#familyGrid");
    const variantTabs = document.querySelector("#variantTabs");
    const search = document.querySelector("#search");

    function normalize(text) {
      return String(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function bikeSearchText(bike) {
      return [
        bike.name, bike.category, bike.use, bike.description, bike.tags.join(" "),
        bike.pitches.join(" "), bike.notes,
        Object.values(bike.variants).map(v => [
          v.label, v.price, v.motor, v.battery, v.range, v.brakes, v.wheels, v.transmission, v.load, v.options.join(" ")
        ].join(" ")).join(" ")
      ].join(" ");
    }

    function filteredBikes() {
      const q = normalize(state.query.trim());
      if (!q) return bikes;
      return bikes.filter(bike => normalize(bikeSearchText(bike)).includes(q));
    }

    function selectedBike() {
      return bikes.find(bike => bike.id === state.bikeId) || bikes[0];
    }

    function selectedVariant(bike) {
      if (!bike.variants[state.speed]) {
        state.speed = Object.keys(bike.variants)[0];
      }
      return bike.variants[state.speed];
    }

    function renderFamilies() {
      const visible = filteredBikes();
      familyGrid.innerHTML = "";

      visible.forEach(bike => {
        const button = document.createElement("button");
        button.className = "family-button" + (bike.id === state.bikeId ? " active" : "");
        button.type = "button";
        button.innerHTML = `
          <span>
            <span class="family-name">${bike.name}</span>
            <span class="family-use">${bike.use}</span>
          </span>
          <span class="speed-pills">${Object.keys(bike.variants).map(speed => `<span class="pill">${speed}</span>`).join("")}</span>
        `;
        button.addEventListener("click", () => {
          state.bikeId = bike.id;
          state.speed = Object.keys(bike.variants)[0];
          render();
        });
        familyGrid.appendChild(button);
      });

      if (!visible.some(bike => bike.id === state.bikeId) && visible[0]) {
        state.bikeId = visible[0].id;
        state.speed = Object.keys(visible[0].variants)[0];
      }
    }

    function renderVariants(bike) {
      variantTabs.innerHTML = "";
      Object.entries(bike.variants).forEach(([speed, variant]) => {
        const button = document.createElement("button");
        button.className = "variant-tab" + (speed === state.speed ? " active" : "");
        button.type = "button";
        button.textContent = variant.label;
        button.addEventListener("click", () => {
          state.speed = speed;
          render();
        });
        variantTabs.appendChild(button);
      });
    }

    function spec(label, value) {
      return `
        <div class="spec">
          <span class="spec-label">${label}</span>
          <span class="spec-value">${value}</span>
        </div>
      `;
    }

    function renderCompare(bike) {
      const speeds = Object.keys(bike.variants);
      if (speeds.length < 2) {
        return `<p class="source-note">Une seule variante documentee dans les brochures locales: ${bike.variants[speeds[0]].label}.</p>`;
      }

      const rows = [
        ["Prix", "price"],
        ["Moteur", "motor"],
        ["Batterie", "battery"],
        ["Autonomie", "range"],
        ["Transmission", "transmission"]
      ];

      return `
        <table class="compare-table">
          <thead>
            <tr>
              <th>Critere</th>
              ${speeds.map(speed => `<th>${bike.variants[speed].label}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${rows.map(([label, key]) => `
              <tr>
                <td><strong>${label}</strong></td>
                ${speeds.map(speed => `<td>${bike.variants[speed][key]}</td>`).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderDetail() {
      const bike = selectedBike();
      const variant = selectedVariant(bike);

      document.querySelector("#category").textContent = bike.category;
      document.querySelector("#title").textContent = bike.name;
      document.querySelector("#description").textContent = bike.description;
      document.querySelector("#price").textContent = variant.price;
      document.querySelector("#tags").innerHTML = bike.tags.map(tag => `<span class="tag">${tag}</span>`).join("");
      document.querySelector("#pitch").innerHTML = bike.pitches.map(item => `<li>${item}</li>`).join("");
      document.querySelector("#specs").innerHTML = [
        spec("Moteur", variant.motor),
        spec("Batterie", variant.battery),
        spec("Autonomie", variant.range),
        spec("Freins", variant.brakes),
        spec("Roues", variant.wheels),
        spec("Transmission", variant.transmission),
        spec("Charge / poids", variant.load),
        spec("Vitesse", variant.label)
      ].join("");
      document.querySelector("#compare").innerHTML = renderCompare(bike);
      document.querySelector("#options").innerHTML = variant.options.map(item => `<li>${item}</li>`).join("");
      document.querySelector("#pdfs").innerHTML = variant.pdfs.map(pdf => `
        <li><a href="${pdf.href}" target="_blank" rel="noopener"><span>${pdf.label}</span><span aria-hidden="true">PDF</span></a></li>
      `).join("");
      document.querySelector("#notes").textContent = bike.notes + " Source complementaire back-office non trouvee dans ce dossier; les prix et specs affiches proviennent des PDF locaux.";

      renderVariants(bike);
      document.title = `${bike.name} ${variant.label} - Miloo`;
    }

    function render() {
      renderFamilies();
      renderDetail();
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    render();
  </script>
